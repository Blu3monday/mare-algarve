<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maré">
<meta name="theme-color" content="#123B41">
<title>Maré · Algarve 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12333A; --lagoon:#17565C; --lagoon-deep:#0E3F45; --lagoon-mist:#DDEAE8;
  --sand:#F4EDE0; --paper:#FDFAF3; --line:#E4DACA; --muted:#66787A;
  --clay:#BE5F3B; --clay-soft:#F3DED2; --gold:#DFA050; --gold-soft:#F7E8CF;
  --ok:#2F7D5A; --warn:#B0413E; --warn-soft:#F5DEDD;
  --c-plage:#2C7DA0; --c-nature:#3E7C4F; --c-resto:#BE5F3B; --c-cafe:#A9752F;
  --c-bar:#7A4E8C; --c-culture:#8A5E2B; --c-village:#C98A2D; --c-pdv:#DFA050;
  --c-shopping:#B04E6E; --c-activite:#1F8A70; --c-vignoble:#7E3F5D; --c-base:#12333A;
  --r:14px; --shadow:0 6px 24px rgba(18,51,58,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'Outfit',system-ui,-apple-system,sans-serif;background:var(--sand);color:var(--ink);
  min-height:100dvh;overscroll-behavior-y:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,textarea{font-family:inherit;font-size:1rem}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

header{position:sticky;top:0;z-index:900;background:var(--lagoon-deep);color:var(--paper);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 0}
.brand{display:flex;align-items:baseline;gap:10px}
.brand h1{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:1.7rem;letter-spacing:.01em}
.brand small{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.offline-dot{margin-left:auto;font-size:.7rem;padding:3px 9px;border-radius:99px;background:rgba(255,255,255,.14);display:none}
.offline-dot.show{display:inline-block}
.marebar{margin:10px -16px 0;padding:9px 16px calc(9px);display:flex;gap:14px;align-items:center;
  font-size:.8rem;color:#0E2F34;
  background:linear-gradient(90deg,#BFDCD6 0%,#E9D9B8 55%,#EEC08A 100%)}
.marebar .mb-item{display:flex;align-items:center;gap:5px;white-space:nowrap}
.marebar b{font-weight:600}
.marebar a{color:inherit;text-decoration:underline;text-underline-offset:2px}
.marebar .wave{margin-left:auto;opacity:.55;flex:0 0 auto}

main{padding:14px 14px calc(84px + env(safe-area-inset-bottom));max-width:680px;margin:0 auto}
.view{display:none;animation:fadeIn .22s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
nav.tabs{position:fixed;bottom:0;left:0;right:0;z-index:950;background:var(--paper);
  border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav.tabs button{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:.63rem;font-weight:500;color:var(--muted);letter-spacing:.02em}
nav.tabs button .ic{font-size:1.25rem;line-height:1}
nav.tabs button.active{color:var(--lagoon)}
nav.tabs button.active .ic{transform:translateY(-1px)}
nav.tabs button.active::after{content:'';width:18px;height:3px;border-radius:3px;background:var(--clay);margin-top:2px}

h2.sec{font-family:'Fraunces',serif;font-weight:600;font-size:1.15rem;margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
h2.sec:first-child{margin-top:2px}
h2.sec .n{font-size:.72rem;font-family:'Outfit';font-weight:600;color:var(--muted);background:var(--paper);
  border:1px solid var(--line);padding:1px 8px;border-radius:99px}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.place-row{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line);align-items:center;width:100%;text-align:left}
.place-row:last-child{border-bottom:none}
.place-row .dot{flex:0 0 12px;width:12px;height:12px;border-radius:50%;margin-top:2px}
.place-row .pr-main{flex:1;min-width:0}
.place-row .pr-name{font-weight:600;font-size:.95rem;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.place-row .pr-sub{font-size:.78rem;color:var(--muted);margin-top:1px}
.place-row .pr-dist{flex:0 0 auto;text-align:right;font-size:.8rem;font-weight:600;color:var(--lagoon)}
.place-row .pr-dist small{display:block;font-weight:400;color:var(--muted);font-size:.68rem}
.badge{font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:99px;letter-spacing:.03em}
.badge.inc{background:var(--gold-soft);color:#8a5f16}
.badge.closed{background:var(--warn-soft);color:var(--warn)}
.badge.ok{background:#DDEEE4;color:var(--ok)}
.badge.ferme{background:var(--warn);color:#fff}
.badge.pin{background:var(--clay-soft);color:var(--clay)}
.badge.resa{background:var(--lagoon-mist);color:var(--lagoon)}
.empty{padding:26px 18px;text-align:center;color:var(--muted);font-size:.88rem;line-height:1.5}

.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.quick button{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 6px 11px;display:flex;flex-direction:column;align-items:center;gap:5px;
  font-size:.74rem;font-weight:600;box-shadow:var(--shadow);transition:transform .1s}
.quick button:active{transform:scale(.96)}
.quick button .qi{font-size:1.5rem}
.quick button.util{background:var(--lagoon-mist);border-color:#C7DBD8}
.factcard{margin-top:16px;padding:14px 16px;border-radius:var(--r);background:var(--lagoon-deep);color:var(--paper);
  font-size:.86rem;line-height:1.55;position:relative;overflow:hidden}
.factcard::before{content:'✺';position:absolute;right:-8px;top:-16px;font-size:5rem;opacity:.08}
.factcard .f-tag{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;display:block;margin-bottom:5px}
.pinstrip .place-row{background:linear-gradient(0deg,rgba(190,95,59,.05),rgba(190,95,59,.05))}
.daybanner{display:flex;gap:10px;align-items:center;padding:10px 14px;font-size:.8rem;background:var(--gold-soft);
  border:1px solid #EAD3A8;border-radius:var(--r);margin-bottom:12px}
.daybanner button{font-weight:600;color:var(--clay);text-decoration:underline;text-underline-offset:2px}

.chips{display:flex;gap:7px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 13px;border-radius:99px;background:var(--paper);border:1px solid var(--line);
  font-size:.78rem;font-weight:500;white-space:nowrap}
.chip.on{background:var(--lagoon);border-color:var(--lagoon);color:#fff}

#mapwrap{position:relative;height:calc(100dvh - 235px);min-height:340px;border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
#map{height:100%;width:100%;background:#DCE7E5}
.locbtn{position:absolute;bottom:14px;right:12px;z-index:800;width:44px;height:44px;border-radius:50%;
  background:var(--paper);box-shadow:var(--shadow);font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.leaflet-div-icon{background:none;border:none}
.pin{width:26px;height:26px;border-radius:50% 50% 50% 4px;transform:rotate(-45deg);border:2.5px solid #fff;
  box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
.pin span{transform:rotate(45deg);font-size:.68rem}
.pin.home{width:30px;height:30px}
.mylo{width:16px;height:16px;border-radius:50%;background:#2C7DA0;border:3px solid #fff;box-shadow:0 0 0 5px rgba(44,125,160,.25)}

.search{display:flex;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:10px 14px;align-items:center;margin-bottom:6px}
.search input{border:none;outline:none;flex:1;background:none;font-size:.95rem}
.gscroll{display:flex;gap:10px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none}
.gscroll::-webkit-scrollbar{display:none}
.gcard{flex:0 0 168px;background:var(--lagoon);color:var(--paper);border-radius:var(--r);padding:13px 13px 11px;text-align:left;
  position:relative;overflow:hidden;min-height:96px;display:flex;flex-direction:column}
.gcard:nth-child(3n+2){background:var(--clay)}
.gcard:nth-child(3n){background:#3E6E63}
.gcard .g-n{font-family:'Fraunces',serif;font-weight:600;font-size:.95rem;line-height:1.25}
.gcard .g-z{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;opacity:.75;margin-bottom:4px}
.gcard .g-c{margin-top:auto;font-size:.7rem;opacity:.85}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.catgrid button{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:10px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.66rem;font-weight:500}
.catgrid .ci{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:#fff}

.sheet-veil{position:fixed;inset:0;background:rgba(14,47,52,.45);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-veil.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:1001;background:var(--paper);border-radius:22px 22px 0 0;
  max-height:88dvh;overflow-y:auto;transform:translateY(102%);transition:transform .26s cubic-bezier(.3,1,.4,1);
  padding:10px 18px calc(22px + env(safe-area-inset-bottom))}
.sheet.open{transform:none}
.sheet .grip{width:40px;height:4px;border-radius:4px;background:var(--line);margin:2px auto 12px}
.sh-cat{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;font-weight:600;display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:99px;color:#fff}
.sheet h3{font-family:'Fraunces',serif;font-size:1.45rem;font-weight:600;margin:9px 0 3px;line-height:1.15}
.sh-sub{font-size:.8rem;color:var(--muted)}
.sh-badges{display:flex;gap:6px;flex-wrap:wrap;margin:9px 0 2px}
.sh-desc{font-size:.92rem;line-height:1.6;margin:12px 0 0}
.sh-tip{margin-top:11px;padding:11px 13px;background:var(--gold-soft);border-radius:12px;font-size:.85rem;line-height:1.5}
.sh-tip b{font-weight:600}
.sh-fact{margin-top:9px;padding:11px 13px;background:var(--lagoon-mist);border-radius:12px;font-size:.83rem;line-height:1.5;font-style:italic}
.sh-meta{margin-top:11px;font-size:.82rem;color:var(--muted);line-height:1.7}
.sh-meta b{color:var(--ink);font-weight:600}
.sh-check{margin-top:10px;padding:10px 13px;border-radius:12px;font-size:.82rem;line-height:1.5;background:var(--sand);border:1px dashed var(--line)}
.acts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:15px}
.acts button,.acts a{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px;border-radius:12px;
  font-size:.86rem;font-weight:600;text-decoration:none;border:1.5px solid var(--line);color:var(--ink);background:var(--paper)}
.acts .go{grid-column:1/-1;background:var(--lagoon);border-color:var(--lagoon);color:#fff;font-size:.95rem}
.acts button.on{background:var(--clay-soft);border-color:var(--clay);color:var(--clay)}
.gomenu{display:none;grid-column:1/-1;grid-template-columns:repeat(3,1fr);gap:8px}
.gomenu.open{display:grid}
.gomenu a{padding:10px 4px;font-size:.78rem}
.notebox{margin-top:13px}
.notebox textarea{width:100%;min-height:64px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;
  background:var(--sand);resize:vertical;font-size:.88rem}
.notebox label{font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:5px}
.ratebar{display:flex;gap:8px;margin-top:12px}
.ratebar button{flex:1;padding:9px 4px;border-radius:12px;border:1.5px solid var(--line);font-size:.8rem;font-weight:600;background:var(--paper)}
.ratebar button.on{background:var(--lagoon);color:#fff;border-color:var(--lagoon)}

.chatbox{display:flex;flex-direction:column;height:calc(100dvh - 245px);min-height:330px}
.msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:4px 2px 12px}
.msg{max-width:86%;padding:11px 14px;border-radius:16px;font-size:.9rem;line-height:1.55;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--lagoon);color:#fff;border-bottom-right-radius:5px}
.msg.bot{align-self:flex-start;background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:5px}
.msg.bot .chip-place{display:inline-block;margin:3px 4px 1px 0;padding:4px 11px;border-radius:99px;background:var(--clay-soft);
  color:var(--clay);font-size:.8rem;font-weight:600}
.msg.think{align-self:flex-start;color:var(--muted);font-size:.8rem;font-style:italic;background:none;padding:2px 6px}
.chatin{display:flex;gap:8px;padding-top:10px}
.chatin textarea{flex:1;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:var(--paper);
  resize:none;max-height:110px;font-size:.92rem}
.chatin button{width:48px;height:48px;border-radius:50%;background:var(--clay);color:#fff;font-size:1.15rem;flex:0 0 auto;align-self:flex-end}
.chatin button:disabled{opacity:.45}
.sugg{display:flex;gap:7px;overflow-x:auto;padding:6px 0 2px;scrollbar-width:none}
.sugg::-webkit-scrollbar{display:none}
.sugg button{flex:0 0 auto;font-size:.76rem;padding:7px 12px;border-radius:99px;background:var(--paper);border:1px solid var(--line)}

.jentry{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:11px;align-items:flex-start}
.jentry:last-child{border:none}
.jentry .je-emo{font-size:1.3rem;flex:0 0 auto}
.jentry .je-d{font-size:.7rem;color:var(--muted)}
.jentry .je-n{font-weight:600;font-size:.92rem}
.jentry .je-note{font-size:.82rem;color:var(--muted);margin-top:2px;font-style:italic}
details.acc{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);margin-bottom:9px;overflow:hidden}
details.acc summary{padding:13px 15px;font-weight:600;font-size:.9rem;cursor:pointer;list-style:none;display:flex;gap:9px;align-items:center}
details.acc summary::after{content:'⌄';margin-left:auto;color:var(--muted);transition:transform .2s}
details.acc[open] summary::after{transform:rotate(180deg)}
details.acc .acc-b{padding:0 15px 14px;font-size:.86rem;line-height:1.65;color:#3c4f52}
.toast{position:fixed;bottom:calc(96px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:.84rem;z-index:1200;opacity:0;
  transition:all .25s;pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px}
.spin.dark{border-color:rgba(18,51,58,.25);border-top-color:var(--ink)}
@keyframes sp{to{transform:rotate(360deg)}}
.dayhero{background:linear-gradient(135deg,var(--lagoon-deep),#255E57 60%,#8A6B36);color:var(--paper);
  border-radius:var(--r);padding:15px 16px 13px;margin-bottom:14px;box-shadow:var(--shadow)}
.dayhero .dh-t{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:600;margin-bottom:3px}
.dayhero .dh-s{font-size:.78rem;opacity:.85;line-height:1.45}
.dayhero .dh-btns{display:flex;gap:8px;margin-top:11px}
.dayhero .dh-btns button{flex:1;padding:10px 8px;border-radius:11px;font-weight:600;font-size:.84rem;
  background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);color:var(--paper)}
.dayhero .dh-btns button:active{background:rgba(255,255,255,.24)}
.radar{margin-top:11px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.25);font-size:.76rem;line-height:1.5}
.radar b{color:var(--gold)}
.radar .r-item{display:inline-block;margin:3px 5px 0 0;padding:3px 10px;border-radius:99px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);font-size:.73rem}
.badge.done{background:#DDEEE4;color:var(--ok)}

html{touch-action:manipulation}
html,body{overflow-x:hidden;overscroll-behavior:none;max-width:100vw}
.marebar{flex-wrap:wrap;row-gap:3px;column-gap:12px}
.presszone{margin-top:10px}
.presszone a{display:block;padding:9px 12px;margin-top:6px;border-radius:11px;background:var(--lagoon-mist);
  color:var(--lagoon-deep);font-size:.82rem;font-weight:500;text-decoration:none;line-height:1.35}
.presszone a small{display:block;font-weight:400;color:var(--muted);font-size:.7rem;margin-top:1px}
@media(max-width:440px){
  header{padding-left:13px;padding-right:13px}
  .brand h1{font-size:1.38rem}.brand small{font-size:.56rem;letter-spacing:.09em}
  .offline-dot{font-size:.62rem;padding:2px 7px}
  .marebar{font-size:.71rem;padding:8px 13px;margin:9px -13px 0}
  .marebar .wave{display:none}
  main{padding:11px 10px calc(82px + env(safe-area-inset-bottom))}
  h2.sec{font-size:1.02rem;margin:15px 2px 8px}
  .quick{gap:7px}.quick button{padding:11px 3px 9px;font-size:.68rem;border-radius:12px}
  .quick button .qi{font-size:1.28rem}
  .dayhero{padding:13px 13px 11px}.dayhero .dh-t{font-size:.96rem}
  .dayhero .dh-s{font-size:.73rem}.dayhero .dh-btns button{font-size:.79rem;padding:9px 5px}
  .radar{font-size:.71rem}
  .factcard{font-size:.81rem;padding:12px 13px}
  .place-row{padding:10px 11px;gap:10px}.place-row .pr-name{font-size:.88rem}
  .place-row .pr-sub{font-size:.73rem}.place-row .pr-dist{font-size:.74rem}
  .gcard{flex-basis:148px;min-height:90px;padding:11px 11px 10px}.gcard .g-n{font-size:.86rem}
  .catgrid{gap:7px}.catgrid button{font-size:.62rem;padding:9px 2px}
  #mapwrap{height:calc(100dvh - 275px);min-height:300px}
  .sheet{padding:9px 14px calc(20px + env(safe-area-inset-bottom))}
  .sheet h3{font-size:1.28rem}.sh-desc{font-size:.88rem}
  .acts{gap:8px}.acts button,.acts a{padding:11px 5px;font-size:.79rem}
  .chatbox{height:calc(100dvh - 300px);min-height:290px}
  .msg{font-size:.86rem;max-width:91%}
  .sugg button{font-size:.72rem;padding:6px 10px}
  nav.tabs button{font-size:.59rem;padding-top:8px}nav.tabs button .ic{font-size:1.18rem}
  .toast{font-size:.78rem;max-width:94vw}
}

</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Maré</h1><small>Algarve · Sophie &amp; Marine</small>
    <span class="offline-dot" id="offdot">● hors ligne</span>
  </div>
  <div class="marebar" id="marebar">
    <span class="mb-item" id="mb-day"><b>…</b></span>
    <span class="mb-item" id="mb-sun">☀️ …</span>
    <span class="mb-item">🌊 <a href="https://tabuademares.com/pt/faro/olhao" target="_blank" rel="noopener">Marées</a></span>
    <svg class="wave" width="34" height="10" viewBox="0 0 34 10" fill="none"><path d="M1 5 Q5 1 9 5 T17 5 T25 5 T33 5" stroke="#0E2F34" stroke-width="1.6" stroke-linecap="round"/></svg>
  </div>
</header>

<main>
  <section class="view active" id="v-ici">
    <div id="dayhero"></div>
    <div id="daybanner"></div>
    <div id="pinblock"></div>
    <h2 class="sec">Autour de moi, maintenant</h2>
    <div class="quick">
      <button data-q="manger"><span class="qi">🍽️</span>Manger</button>
      <button data-q="boire"><span class="qi">🍹</span>Boire</button>

<script>
const DB = {"meta":{"destination":"Algarve & Alentejo Litoral, Portugal","voyage":{"arrivee":"2026-07-15T22:55","depart_aeroport":"2026-07-27T08:45","base":"Pure Formosa Concept Hotel, Olhão","base_coords":[37.0264,-7.8434],"vehicule":"FIAT 500 Diesel (lun→dim)","voyageurs":["Sophie","Marine"],"amis":"Carvoeiro (activités en journée)"},"gouts":["authentique","anti-foule","bonne bouffe","nature","culture","budget modéré"],"regle_route":"max ~2x2h de conduite par jour","sources":"Corpus projet Algarve_2026 (guides FR + blog résident local Blinking Flamingos + Maré Algarve)","extraction_date":"2026-07-02"},"grappes":[{"id":"g-olhao","nom":"Olhão — le QG","zone":"Sotavento","note":"Base du séjour. Marché, cubisme, bars de pêcheurs, départ ferries îles."},{"id":"g-fuseta","nom":"Fuseta & les salines","zone":"Sotavento","note":"15 min d'Olhão. Village coup de cœur des sources, ambiance 100% locale."},{"id":"g-tavira","nom":"Le coin de Tavira","zone":"Sotavento","note":"Tavira + Santa Luzia (capitale du poulpe) + Cabanas + Praia do Barril."},{"id":"g-cacela","nom":"Cacela Velha & l'extrême est","zone":"Sotavento","note":"Village minuscule au-dessus de la lagune, eau turquoise."},{"id":"g-faro-ria","nom":"Faro & les îles de la Ria","zone":"Sotavento","note":"Vieille ville + Ilha Deserta + Culatra/Armona/Farol."},{"id":"g-carvoeiro","nom":"Boucle Carvoeiro–Benagil–Ferragudo","zone":"Barlavento","note":"Journée avec les amis. Benagil à réserver, Algar Seco, dîner Ferragudo."},{"id":"g-lagos-sagres","nom":"Virée Lagos–Sagres–Cap St-Vincent","zone":"Barlavento","note":"Grosse journée ouest. Ponta da Piedade + coucher de soleil au Cap."},{"id":"g-cote-ouest","nom":"Costa Vicentina sauvage","zone":"Côte ouest","note":"Carrapateira, Bordeira, Amado, Arrifana, Aljezur. Prévoir pique-nique, peu de réseau."},{"id":"g-monchique","nom":"Monchique & la montagne","zone":"Terres","note":"Fóia (point culminant), Caldas thermales, restos de viande en altitude."},{"id":"g-terres","nom":"Villages des terres","zone":"Terres","note":"Silves, Loulé, Alte, Estoi. Frais le matin, marchés."},{"id":"g-vignobles","nom":"Route des vins","zone":"Transverse","note":"Dégustation = pas de volant : viser domaines proches ou modération."},{"id":"g-alentejo","nom":"Échappée Alentejo Litoral","zone":"Alentejo","note":"Zambujeira, Odeceixe, Praia da Amalia. Journée longue ou nuit sur place."}],"lieux":[{"id":"olh-mercado","nom":"Mercado Municipal de Olhão","cat":"culture","sous_cat":"marché","grappe":"g-olhao","coords":[37.0253,-7.8412],"tag":"incontournable","desc":"Les deux halles de brique rouge sur le front de lagune — plus grand marché aux poissons de la région, poisson de la criée du matin. Bars tout autour côté eau.","conseil":"Y aller le matin (fermé dimanche). Samedi = jour des producteurs.","gouts_match":["authentique","bonne bouffe"]},{"id":"olh-cubiste","nom":"Quartier cubiste d'Olhão (Barreta)","cat":"culture","sous_cat":"balade urbaine","grappe":"g-olhao","coords":[37.0262,-7.842],"tag":"incontournable","desc":"Maisons blanches cubiques à terrasses, ruelles pavées d'inspiration marocaine (liens commerciaux, pas les Maures). Unique en Algarve avec Fuseta.","conseil":"S'écarter de 20 m des artères principales : un autre monde, calme et ombragé.","fact":"Olhão n'a eu le droit de bâtir en pierre qu'en 1808 — récompense royale : des pêcheurs d'ici ont traversé l'Atlantique en petit caïque pour annoncer au roi exilé au Brésil que les Français étaient chassés. La réplique du bateau, le Bom Sucesso, est sur le front de mer près du marché.","gouts_match":["authentique","culture"]},{"id":"olh-eglise","nom":"Igreja Matriz N.S. do Rosário","cat":"culture","sous_cat":"église","grappe":"g-olhao","coords":[37.027,-7.841],"tag":"a_saisir","desc":"Église (1698-1715) financée par les pêcheurs. Retable doré, chapelle extérieure N.S. dos Aflitos où les femmes de pêcheurs priaient pour le retour des marins.","conseil":"Monter au clocher : vue sur les toits cubistes."},{"id":"olh-mural","nom":"Mural Rua da Fábrica Velha","cat":"culture","sous_cat":"street art","grappe":"g-olhao","coords":[37.0289,-7.8365],"tag":"a_saisir","desc":"Fresque monumentale en noir et blanc près du Pingo Doce côté ferries : pêcheurs, conserveries, marché — l'âme d'Olhão sur un mur. Tout le monde passe devant sans regarder.","conseil":"Combiner avec la chasse au street art dans les ruelles."},{"id":"olh-quinta-marim","nom":"Quinta de Marim (Parc Ria Formosa)","cat":"nature","sous_cat":"balade","grappe":"g-olhao","coords":[37.0333,-7.8167],"tag":"a_saisir","desc":"Centre du parc naturel à ~3 km d'Olhão : sentiers, moulin à marée, oiseaux. Petits restos locaux près de l'entrée.","conseil":"Balade le matin puis déjeuner à côté. Accessible aussi par l'Ecovia à vélo."},{"id":"olh-piteu","nom":"Pitéu da Baixa Mar","cat":"resto","sous_cat":"poisson","grappe":"g-olhao","coords":[37.0251,-7.8405],"tag":"incontournable","adresse":"Av. 5 de Outubro 12, Olhão","tel":"+351 289 705 749","horaires":"12h-15h & 19h-23h, fermé lundi (mardi soir seult)","prix":"€€","desc":"LE resto de poisson recommandé par les locaux d'Olhão (c'est le patron du bar Sete Estrelas qui l'a soufflé à l'auteur du blog). Toujours plein.","conseil":"Réserver ou arriver tôt.","gouts_match":["authentique","bonne bouffe"],"verifier":true},{"id":"olh-vai-e-volta","nom":"Vai e Volta","cat":"resto","sous_cat":"grillades à volonté","grappe":"g-olhao","coords":[37.0281,-7.8447],"tag":"incontournable","adresse":"Largo do Grémio 2, Olhão","tel":"+351 968 027 525","horaires":"midi-15h30, fermé lundi","prix":"€ (~12€ à volonté)","desc":"Concept radical : poisson grillé à volonté, pas de menu, pas de choix, cash only. Brillant.","conseil":"Midi uniquement. Arriver et espérer — pas de résa.","gouts_match":["authentique","bonne bouffe"],"verifier":true},{"id":"olh-pizza-pedra","nom":"Pizza na Pedra","cat":"resto","sous_cat":"pizza","grappe":"g-olhao","coords":[37.0252,-7.8409],"tag":"plan_b","adresse":"Av. 5 de Outubro 50, Olhão","horaires":"midi-23h","prix":"€","desc":"Le plan B parfait face au marché — bonnes pizzas, vue du 1er étage. Idéal soir d'arrivée tardive.","conseil":"Utile le 15/07 au soir si vous arrivez affamées après 23h — à vérifier si ouvert tard.","verifier":true},{"id":"olh-casinha-cris","nom":"Casinha da Cris","cat":"resto","sous_cat":"végétarien","grappe":"g-olhao","coords":[37.0268,-7.8415],"tag":"plan_b","adresse":"Tv. do Compromisso 14, Olhão","horaires":"8h-17h, fermé samedi","prix":"€","desc":"Café végétarien derrière l'église, zone piétonne près du musée. Très aimé.","verifier":true},{"id":"olh-delicia","nom":"Delícia de Olhão","cat":"cafe","sous_cat":"pastelaria","grappe":"g-olhao","coords":[37.0254,-7.8407],"tag":"a_saisir","adresse":"Av. 5 de Outubro 20, Olhão","horaires":"6h-22h","prix":"€","desc":"La pastelaria du front de mer, toujours bondée. Croissants au chocolat à 1€, pastéis de nata.","conseil":"Le spot petit-déj du séjour — à 2 min de l'hôtel."},{"id":"olh-sete-estrelas","nom":"Sete Estrelas","cat":"bar","sous_cat":"bar local","grappe":"g-olhao","coords":[37.0261,-7.84],"tag":"incontournable","adresse":"Tv. Alexandre Herculano 4, Olhão","desc":"Le bar comme il y a 50 ans : tonneaux derrière le comptoir, vieux pêcheurs, plat du jour sans menu à prix arbitraire, medronho. L'authenticité maximale d'Olhão.","conseil":"Pas de cocktails ici — café, vin, bière, medronho. C'est le but.","gouts_match":["authentique"],"verifier":true},{"id":"olh-saaz","nom":"Saaz Craft Beer Lounge","cat":"bar","sous_cat":"bière artisanale","grappe":"g-olhao","coords":[37.0266,-7.8425],"tag":"a_saisir","adresse":"Rua do Comércio 42, Olhão","horaires":"dès 16h","desc":"Bières artisanales portugaises et européennes qui tournent, staff calé. À deux rues du front de mer.","verifier":true},{"id":"olh-catita","nom":"Catita & Companhia","cat":"bar","sous_cat":"cocktails","grappe":"g-olhao","coords":[37.0255,-7.841],"tag":"a_saisir","adresse":"Av. 5 de Outubro 60, Olhão","horaires":"18h-4h, fermé lundi","desc":"Cocktails, live music, en face du marché. Ouvre tard.","conseil":"Happy hour 18h-20h.","verifier":true},{"id":"olh-panorama","nom":"Le Panorama (au marché)","cat":"bar","sous_cat":"bar-tapas","grappe":"g-olhao","coords":[37.0253,-7.8414],"tag":"a_saisir","adresse":"Mercado, Loja 53, Olhão","desc":"Petit bar tenu par un couple français côté eau du marché : verre + tapas + vue sur la Ria. Parfait apéro doré.","verifier":true},{"id":"olh-olhos-na-ria","nom":"Olhos na Ria (chez Daniella)","cat":"bar","sous_cat":"bar de pêcheurs","grappe":"g-olhao","coords":[37.0249,-7.839],"tag":"a_saisir","adresse":"Av. 5 de Outubro (vers les ferries), Olhão","desc":"Bière à 1€, pêcheurs au comptoir après la nuit en mer, tenu en famille. Brut mais accueillant — et une bonne cave à vin juste à côté.","gouts_match":["authentique"],"verifier":true},{"id":"olh-republica","nom":"República do Se7e","cat":"bar","sous_cat":"bar culturel","grappe":"g-olhao","coords":[37.0272,-7.8408],"tag":"a_saisir","adresse":"Av. da República 14, Olhão","horaires":"9h30-22h (ven-sam 23h45)","desc":"OVNI local : bar + cinéma + expos + terrasse arrière + cours de tai-chi. Pour une soirée différente.","verifier":true},{"id":"fus-village","nom":"Village de Fuseta","cat":"village","grappe":"g-fuseta","coords":[37.053,-7.746],"tag":"incontournable","desc":"Coup de cœur unanime des sources : village de pêcheurs 100% authentique, azulejos, place aux petits cafés, plage-lagune où les bancs de sable se découvrent à marée basse, échassiers.","conseil":"Expresso + pastel de nata en terrasse sur la place, puis quai des pêcheurs.","gouts_match":["authentique","anti-foule"]},{"id":"fus-lota","nom":"A Lota","cat":"resto","sous_cat":"poisson grillé","grappe":"g-fuseta","coords":[37.0525,-7.7442],"tag":"incontournable","adresse":"Largo 1° de Maio, Fuseta","tel":"+351 964 657 449","horaires":"12h-minuit, fermé jeudi","prix":"€€","desc":"Poisson grillé au charbon à côté des tables, près du Mercado et des bateaux. Le staff traverse la rue avec les plats — un spectacle en soi. Plus authentique que ses voisins du quai.","conseil":"Arriver tôt en été, ça queue partout.","gouts_match":["authentique","bonne bouffe"],"verifier":true},{"id":"fus-hamburgueria","nom":"Hamburgueria do Largo","cat":"resto","sous_cat":"burgers","grappe":"g-fuseta","coords":[37.0528,-7.745],"tag":"plan_b","adresse":"R. Ten. Barroso 48, Fuseta","horaires":"12h55-15h & 18h55-23h, fermé mercredi","prix":"€","desc":"Excellents burgers maison, tiramisu, si envie d'autre chose que du poisson.","verifier":true},{"id":"fus-green-spirit","nom":"Escandinavia – Green Spirit","cat":"resto","sous_cat":"végétarien","grappe":"g-fuseta","coords":[37.0526,-7.7448],"tag":"plan_b","adresse":"R. Ten. Barroso 11, Fuseta","horaires":"12-14h30 & 18h30-22h, fermé mardi","desc":"Végétarien cosy dans la rue piétonne du Mercado, musiciens de rue l'été, vieilles dames sur le pas de porte.","verifier":true},{"id":"fus-concha","nom":"A Concha","cat":"bar","sous_cat":"bar-resto chic","grappe":"g-fuseta","coords":[37.0532,-7.7455],"tag":"a_saisir","adresse":"Rua da Liberdade 97, Fuseta","horaires":"17h-1h, fermé lundi","desc":"Bar-resto français (Laurent Gugli) : cocktails, bons vins, et surtout un jardin caché à l'arrière — oasis dans le brouhaha estival.","verifier":true},{"id":"fus-nanobrew","nom":"Nanobrew","cat":"bar","sous_cat":"microbrasserie","grappe":"g-fuseta","coords":[37.0545,-7.7458],"tag":"a_saisir","adresse":"Rua Dr. Virgílio Inglês 114, Fuseta","horaires":"ven dès 17h, dim dès 14h (fermé lun-jeu)","desc":"Microbrasserie dans la maison d'un couple norvégien, jusqu'à 15 bières maison + hydromel. « Possiblement la meilleure bière de l'Algarve. »","conseil":"Prendre le taster de 4 verres. Horaires limités — vérifier avant !","gouts_match":["authentique"],"verifier":true},{"id":"fus-pescador","nom":"O Pescador","cat":"bar","sous_cat":"bar local","grappe":"g-fuseta","coords":[37.0529,-7.7453],"tag":"a_saisir","adresse":"Rua da Liberdade 34, Fuseta","horaires":"9h30-minuit été, fermé jeudi","desc":"Le bar de la place : pêcheurs au comptoir, terrasse mixte locaux/touristes, rough and ready mais confortable.","verifier":true},{"id":"fus-beira-mar","nom":"Snack-bar Beira Mar (le Shack n°1)","cat":"bar","sous_cat":"cabane du quai","grappe":"g-fuseta","coords":[37.0518,-7.744],"tag":"a_saisir","adresse":"Quai de Fuseta","desc":"Cabane en bois sur le quai, Sagres à 1€, ambiance maison ouverte de Francisco. Prendre sa bière et s'asseoir sur le banc face aux bateaux — ciel violet-orangé au couchant.","gouts_match":["authentique"],"verifier":true},{"id":"fus-farol-bar","nom":"Bar O Farol (Shack n°3)","cat":"bar","sous_cat":"live music","grappe":"g-fuseta","coords":[37.0517,-7.7436],"tag":"a_saisir","adresse":"Quai de Fuseta","desc":"Mercredi soir 22h : Domingos e Amigos — Domingos Caetano, ex-star du rock portugais (IRIS) né à Fuseta, joue avec ses élèves. Stones, Dire Straits, Quo. Gratuit et génial.","conseil":"Mercredis 22 et 26/07 pendant votre séjour — à ne pas rater si le concert tient toujours.","verifier":true},{"id":"fus-borda-dagua","nom":"Borda d'Água","cat":"bar","sous_cat":"bar de plage","grappe":"g-fuseta","coords":[37.0512,-7.743],"tag":"a_saisir","horaires":"9h-minuit","desc":"Le seul vrai bar de plage de Fuseta, sur le sable près de la passe. Cocktails, smoothies — cher pour Fuseta mais cadre superbe. Spot coucher de soleil.","verifier":true},{"id":"fus-trinidade","nom":"Pastelaria Trindade","cat":"cafe","sous_cat":"pastelaria","grappe":"g-fuseta","coords":[37.0529,-7.7452],"tag":"plan_b","adresse":"R. Dr. Virgílio Inglês 60A, Fuseta","horaires":"7h-20h, fermé mardi","desc":"La pastelaria de la place — meilleur jus d'orange pressé du coin selon la source.","verifier":true},{"id":"fus-mercado","nom":"Mercado Municipal de Fuseta","cat":"culture","sous_cat":"marché","grappe":"g-fuseta","coords":[37.0524,-7.7444],"tag":"a_saisir","horaires":"7h30-14h, fermé dimanche","desc":"Petit marché frais plein de vie — poisson sur glace, boucher à la demande. Le cœur battant du village."},{"id":"fus-ilha","nom":"Ilha da Fuseta / Ilha da Armona (côté est)","cat":"plage","sous_cat":"île","grappe":"g-fuseta","coords":[37.043,-7.74],"tag":"incontournable","desc":"Bancs de sable et eau turquoise face au village, ferry court ou même à pied/nage à marée très basse par endroits. Sensation de bout du monde à 5 min.","conseil":"MARÉE : consulter les horaires — la lagune se vide et se remplit. Bars de plage seulement en haute saison.","maree_sensible":true,"gouts_match":["anti-foule","nature"]},{"id":"tav-ville","nom":"Tavira","cat":"village","grappe":"g-tavira","coords":[37.127,-7.6485],"tag":"incontournable","desc":"La plus charmante ville du Sotavento : pont romain sur le Gilão, ruelles paisibles, château, ~37 églises, héritage des madragues de thon.","conseil":"Fin d'après-midi + apéro au bord du fleuve. Château pour la vue.","gouts_match":["authentique","culture"]},{"id":"tav-tres-palmeiras","nom":"Três Palmeiras","cat":"resto","sous_cat":"grillades locales","grappe":"g-tavira","coords":[37.122,-7.656],"tag":"a_saisir","adresse":"Rua Vale de Caranguejo, Tavira","tel":"+351 281 325 840","horaires":"12-16h & 17-23h (incertain, plutôt midi)","prix":"€ (~10€)","desc":"Poisson grillé « à volonté sans choix », plein de locaux, près du stade. De l'extérieur ça ne paie pas de mine — c'est le signe.","conseil":"Viser le déjeuner.","gouts_match":["authentique"],"verifier":true},{"id":"tav-little-india","nom":"Little India","cat":"resto","sous_cat":"indien","grappe":"g-tavira","coords":[37.1258,-7.651],"tag":"plan_b","adresse":"Rua Poeta Emiliano da Costa 10, Tavira","horaires":"11h30-15h & 18h-1h","desc":"Petit indien quirky et excellent, hors des sentiers battus.","verifier":true},{"id":"tav-el-tango","nom":"Churrasqueira El Tango Argentino","cat":"resto","sous_cat":"poulet piri-piri","grappe":"g-tavira","coords":[37.1245,-7.6495],"tag":"plan_b","adresse":"Rua Almirante Cândido dos Reis 227, Tavira","horaires":"fermé dimanche","desc":"Poulet piri-piri « le meilleur de Tavira » — locaux qui font la queue jusque dehors. Parfait à emporter pour la plage.","verifier":true},{"id":"tav-venezuela","nom":"Pastelaria Venezuela","cat":"cafe","sous_cat":"pastelaria","grappe":"g-tavira","coords":[37.129,-7.652],"tag":"plan_b","adresse":"R. Álvaro de Campos 11, Tavira","desc":"Pastelaria de quartier jamais vide, près de la gare de Porta Nova.","verifier":true},{"id":"tav-copos-petiscos","nom":"Copos & Petiscos","cat":"resto","sous_cat":"fruits de mer","grappe":"g-tavira","coords":[37.1275,-7.6478],"tag":"plan_b","adresse":"Rua Poeta Emiliano da Costa 6, Tavira","desc":"Fruits de mer recommandé par des amis de la source (non testé par elle).","verifier":true},{"id":"tav-santa-luzia","nom":"Santa Luzia — capitale du poulpe","cat":"village","grappe":"g-tavira","coords":[37.1092,-7.6644],"tag":"incontournable","desc":"Village de pêcheurs de 1500 âmes face à la lagune : le front de mer est une enfilade de restos de poulpe (grillé, à lagareiro, en salade). Les viviers sont à quelques km — fraîcheur imbattable.","conseil":"Déjeuner poulpe + sieste digestive à Praia do Barril juste à côté.","gouts_match":["authentique","bonne bouffe"]},{"id":"tav-barril","nom":"Praia do Barril","cat":"plage","grappe":"g-tavira","coords":[37.095,-7.669],"tag":"incontournable","desc":"Plage d'île-barrière : on y va à pied ou par le petit train touristique depuis Pedras d'el Rei, à travers la lagune. Cimetière des ancres — des centaines d'ancres rouillées des anciennes madraques de thon plantées dans les dunes.","fact":"Les ancres rendent hommage à la pêche au thon disparue dans les années 60 — un des paysages les plus photogéniques et émouvants du Sotavento.","gouts_match":["nature","anti-foule"]},{"id":"tav-cao-raivoso","nom":"Praia do Cão Raivoso","cat":"plage","sous_cat":"plage cachée","grappe":"g-tavira","coords":[37.09,-7.68],"tag":"a_saisir","desc":"« Plage du Chien Enragé » — accessible uniquement à pied/vélo par la pinède depuis Pedras d'el Rei. Dunes dorées, eaux calmes, zéro foule.","conseil":"Combo idéal : plage l'après-midi + Tavira centre le soir.","gouts_match":["anti-foule","nature"]},{"id":"tav-ilha","nom":"Ilha de Tavira","cat":"plage","sous_cat":"île","grappe":"g-tavira","coords":[37.108,-7.63],"tag":"a_saisir","desc":"Île-barrière de la Ria Formosa, 11 km de sable. Ferry depuis Tavira ou Quatro Águas.","maree_sensible":false},{"id":"cac-village","nom":"Cacela Velha","cat":"village","grappe":"g-cacela","coords":[37.156,-7.545],"tag":"incontournable","desc":"Village minuscule perché au-dessus de la lagune : une église, un fortin, quelques maisons blanches, et LA vue sur l'eau turquoise et les bancs de sable. L'un des panoramas les plus purs de l'Algarve.","conseil":"Descendre à la plage par le sentier ; à marée basse on traverse presque à pied. Huîtres au hameau de Fábrica juste à côté.","gouts_match":["authentique","anti-foule","nature"]},{"id":"far-vieille-ville","nom":"Faro — Cidade Velha","cat":"culture","grappe":"g-faro-ria","coords":[37.0146,-7.9345],"tag":"a_saisir","desc":"Vieille ville fortifiée : Arco da Vila, cathédrale, cigognes sur les clochers, Largo da Sé.","conseil":"2-3h suffisent, combiner avec une île."},{"id":"far-ilha-deserta","nom":"Ilha Deserta (Praia da Barreta)","cat":"plage","sous_cat":"île","grappe":"g-faro-ria","coords":[36.964,-7.877],"tag":"incontournable","desc":"L'île déserte : 7 km de sable blanc, silence total, uniquement accessible en bateau depuis Faro. Un seul resto (Estaminé, durable et réputé).","conseil":"Emporter ombre et eau. Le point le plus au sud du Portugal continental.","gouts_match":["anti-foule","nature"],"verifier":true},{"id":"far-culatra","nom":"Ilha da Culatra & Farol","cat":"plage","sous_cat":"île","grappe":"g-faro-ria","coords":[36.989,-7.838],"tag":"a_saisir","desc":"Île de pêcheurs habitée (ferry depuis Olhão !) : village sans voitures, restos de palourdes les pieds dans le sable, phare au bout.","conseil":"Ferry direct depuis le quai d'Olhão — l'excursion la plus simple depuis l'hôtel.","gouts_match":["authentique","anti-foule"]},{"id":"far-armona","nom":"Ilha da Armona","cat":"plage","sous_cat":"île","grappe":"g-faro-ria","coords":[37.018,-7.79],"tag":"a_saisir","desc":"Ferry depuis Olhão. Côté océan : des kilomètres de sable constellé de coquillages, quasi vide. LE plan plage-simplicité depuis la base.","conseil":"Parasol + pique-nique. Vérifier l'horaire du dernier ferry retour !","gouts_match":["anti-foule"]},{"id":"far-estoi","nom":"Palais d'Estoi & ruines de Milreu","cat":"culture","grappe":"g-faro-ria","coords":[37.096,-7.896],"tag":"plan_b","desc":"Palais rococo rose bonbon (devenu pousada) + villa romaine de Milreu à 10 min dans les terres. Combo culture au frais si journée trop chaude ou trop ventée."},{"id":"car-benagil","nom":"Grotte de Benagil","cat":"activite","sous_cat":"kayak/bateau","grappe":"g-carvoeiro","coords":[37.087,-8.4256],"tag":"incontournable","desc":"Le dôme de grès au puits de lumière — accessible uniquement par l'eau (kayak, paddle, bateau). Bondé en journée d'été.","conseil":"RÉSERVER À L'AVANCE. Y aller avant 9h = magie pure, presque seuls. Activité idéale avec les amis de Carvoeiro.","resa_requise":true,"gouts_match":["nature"],"verifier":true},{"id":"car-carvalho","nom":"Praia do Carvalho","cat":"plage","sous_cat":"plage cachée","grappe":"g-carvoeiro","coords":[37.088,-8.431],"tag":"a_saisir","desc":"Crique cachée près de Benagil, accès par un tunnel creusé dans la roche. Turquoise, protégée du vent, pas de bar — prévoir provisions.","conseil":"Tôt le matin ou fin d'après-midi. Combo naturel avec Benagil.","gouts_match":["anti-foule","nature"]},{"id":"car-algar-seco","nom":"Algar Seco & promenade de Carvoeiro","cat":"point_de_vue","grappe":"g-carvoeiro","coords":[37.0885,-8.464],"tag":"incontournable","desc":"Formations rocheuses spectaculaires (arches, piscines, le « boneca ») reliées à Carvoeiro par une passerelle en bois le long des falaises. Superbe au couchant.","gouts_match":["nature"]},{"id":"car-marinha","nom":"Praia da Marinha & Sept Vallées Suspendues","cat":"nature","sous_cat":"rando","grappe":"g-carvoeiro","coords":[37.09,-8.412],"tag":"incontournable","desc":"L'une des plus belles plages d'Europe + le sentier des 7 Vallées Suspendues (Percurso dos Sete Vales Suspensos) qui court au sommet des falaises entre Marinha et Vale de Centeanes (~6 km aller).","conseil":"En juillet : partir TÔT (chaleur + parking). Eau, casquette. Faire un tronçon seulement si les amis préfèrent.","gouts_match":["nature"]},{"id":"car-ferragudo","nom":"Ferragudo","cat":"village","grappe":"g-carvoeiro","coords":[37.126,-8.52],"tag":"a_saisir","desc":"Ancien village de pêcheurs au charme préservé face à Portimão — le compromis authenticité/plages du Barlavento.","conseil":"Dîner en fin de journée avec les amis après Benagil."},{"id":"car-rei-das-praias","nom":"Rei das Praias","cat":"resto","sous_cat":"fruits de mer plage","grappe":"g-carvoeiro","coords":[37.117,-8.515],"tag":"a_saisir","adresse":"Praia dos Caneiros, Ferragudo","prix":"€€€ (40-50€)","desc":"Resto de plage niché dans une crique près de Praia dos Caneiros : cataplana légendaire, gambas grillées.","conseil":"Réserver une table dehors au coucher du soleil.","resa_requise":true,"verifier":true},{"id":"car-cult-n-art","nom":"Cult n' Art Café (Alvor)","cat":"resto","sous_cat":"tapas + artisanat","grappe":"g-carvoeiro","coords":[37.129,-8.592],"tag":"a_saisir","desc":"Pause déjeuner charmante à Alvor : tapas originaux, produits frais, couple aux petits soins — ET un espace artisanat local intégré. Double coche pour vous : bouffe + shopping artisan.","conseil":"Alvor = aussi huîtres en direct du producteur + pont de bois sur le marais au couchant.","gouts_match":["authentique","bonne bouffe"],"verifier":true},{"id":"lag-ponta-piedade","nom":"Ponta da Piedade","cat":"point_de_vue","grappe":"g-lagos-sagres","coords":[37.08,-8.669],"tag":"incontournable","desc":"Le chef-d'œuvre géologique de Lagos : pitons, arches et grottes dorées. Escalier vers les criques, sentier au sommet des falaises.","conseil":"Malgré la foule de Lagos, le site vaut l'exception. Tôt le matin ou au couchant.","gouts_match":["nature"]},{"id":"lag-estudantes","nom":"Praia dos Estudantes","cat":"plage","sous_cat":"plage cachée","grappe":"g-lagos-sagres","coords":[37.096,-8.669],"tag":"a_saisir","desc":"Petite plage oubliée de Lagos, accès par tunnel depuis Praia da Batata, pont « romain » entre les falaises. Photogénique et calme.","conseil":"Marée basse impérative — peu de sable à marée haute.","maree_sensible":true},{"id":"lag-a-forja","nom":"A Forja","cat":"resto","sous_cat":"poisson","grappe":"g-lagos-sagres","coords":[37.103,-8.674],"tag":"a_saisir","adresse":"R. dos Ferreiros 17, Lagos","prix":"€€ (15-25€)","horaires":"pas de résa","desc":"L'institution de Lagos : poisson grillé simple et honnête, prix imbattables, toujours plein de locaux.","conseil":"Arriver tôt ou patienter.","gouts_match":["authentique","bonne bouffe"],"verifier":true},{"id":"sag-cabo","nom":"Cabo de São Vicente","cat":"point_de_vue","grappe":"g-lagos-sagres","coords":[37.0233,-8.9958],"tag":"incontournable","desc":"Le point le plus occidental de l'Europe continentale — le dernier endroit du continent où le soleil se couche sur l'Atlantique. Falaises de 75 m, phare historique.","conseil":"Arriver 45 min avant le couchant (parking + place). Veste même en juillet — le vent souffle fort. Couchant vers 20h50 fin juillet.","gouts_match":["nature"]},{"id":"sag-beliche","nom":"Forte do Beliche","cat":"point_de_vue","grappe":"g-lagos-sagres","coords":[37.027,-8.977],"tag":"a_saisir","desc":"Petit fort entre Sagres et le Cap — le spot couchant moins connu que le Cabo, même lumière, moins de monde.","gouts_match":["anti-foule"]},{"id":"sag-fortaleza","nom":"Forteresse de Sagres & Ponta de Sagres","cat":"culture","grappe":"g-lagos-sagres","coords":[36.995,-8.948],"tag":"a_saisir","desc":"L'éperon fortifié de l'école des navigateurs d'Henri le Navigateur, rose des vents géante, falaises à perte de vue."},{"id":"co-bordeira","nom":"Praia da Bordeira","cat":"plage","sous_cat":"plage sauvage","grappe":"g-cote-ouest","coords":[37.197,-8.904],"tag":"incontournable","desc":"Immense plage sauvage de la côte ouest : dunes infinies, vagues atlantiques, à peine un bâtiment en vue. Passerelles en bois, falaises pour le couchant.","conseil":"Se garer en haut de la colline pour LA vue. Souvent venteux — journée exploration plus que serviette.","gouts_match":["anti-foule","nature"]},{"id":"co-amado","nom":"Praia do Amado","cat":"plage","sous_cat":"surf","grappe":"g-cote-ouest","coords":[37.168,-8.903],"tag":"a_saisir","desc":"Le spot surf emblématique de Carrapateira — écoles de surf, ambiance décontractée, couchers de soleil réputés.","conseil":"Si envie d'une initiation surf, c'est ici ou Arrifana."},{"id":"co-murracao","nom":"Praia da Murração","cat":"plage","sous_cat":"plage secrète","grappe":"g-cote-ouest","coords":[37.123,-8.918],"tag":"a_saisir","desc":"L'une des plages les plus vierges de la région — chemin de terre, aucune installation, aucun réseau. On se sent coupé du monde.","conseil":"Tout emporter. La FIAT 500 passera doucement sur la piste — prudence.","gouts_match":["anti-foule","nature"]},{"id":"co-arrifana","nom":"Praia da Arrifana","cat":"plage","sous_cat":"baie+surf","grappe":"g-cote-ouest","coords":[37.292,-8.865],"tag":"a_saisir","desc":"Coup de cœur du road-tripper du corpus : baie unique protégée des vents du nord, village accroché à la falaise, spot de surf.","conseil":"Loin d'Olhão (~1h50) — à combiner avec Aljezur/Odeceixe en journée côte ouest complète."},{"id":"co-monte-clerigo","nom":"Praia de Monte Clérigo & O Sargo","cat":"plage","grappe":"g-cote-ouest","coords":[37.34,-8.851],"tag":"a_saisir","desc":"Plage familiale sauvage près d'Aljezur + le resto O Sargo face à la mer, « cuisine succulente, l'endroit idéal pour se poser sur la côte ouest ».","verifier":true},{"id":"co-odeceixe","nom":"Odeceixe (village + plage)","cat":"village","grappe":"g-alentejo","coords":[37.434,-8.771],"tag":"a_saisir","desc":"Porte d'entrée nord de l'Algarve : village pavé + plage spectaculaire dans le méandre de la rivière — moitié fleuve, moitié océan.","gouts_match":["authentique","nature"]},{"id":"mon-foia","nom":"Fóia (Monchique)","cat":"point_de_vue","grappe":"g-monchique","coords":[37.315,-8.592],"tag":"a_saisir","desc":"Le point culminant de l'Algarve (902 m) : par temps clair, toute la côte à vos pieds. Fraîcheur bienvenue en juillet.","conseil":"Combiner : village de Monchique + Fóia + resto Luar da Fóia."},{"id":"mon-luar-foia","nom":"Luar da Fóia","cat":"resto","sous_cat":"viande/montagne","grappe":"g-monchique","coords":[37.313,-8.585],"tag":"a_saisir","adresse":"N266-3 4, Monchique","desc":"Terrasse avec vue incroyable sur la côte, LE resto de viande de la montagne selon le corpus.","verifier":true},{"id":"mon-jardin-oliviers","nom":"Le Jardin des Oliviers","cat":"resto","sous_cat":"traditionnel","grappe":"g-monchique","coords":[37.298,-8.57],"tag":"plan_b","adresse":"Sítio do Porto Escuro, dir. Monchique","desc":"Traditionnel portugais copieux, patron francophone super sympa.","verifier":true},{"id":"ter-silves","nom":"Silves & son château","cat":"culture","grappe":"g-terres","coords":[37.189,-8.438],"tag":"a_saisir","desc":"Ancienne capitale maure de l'Algarve : château de grès rouge, cathédrale gothique, ruelles au bord de l'Arade.","conseil":"Matin (chaleur) + Marisqueira Rui pour le déjeuner si envie de fruits de mer XXL."},{"id":"ter-marisqueira-rui","nom":"Marisqueira Rui","cat":"resto","sous_cat":"marisqueira","grappe":"g-terres","coords":[37.19,-8.439],"tag":"a_saisir","adresse":"R. Comendador Vilarinho 27, Silves","prix":"€€€ (30-40€)","desc":"Plateaux débordants de crevettes, crabe, palourdes — désordonné, délicieux, i let POS=null, geoDenied=false;
function haversine(a,b){
  const R=6371,r=Math.PI/180,dLa=(b[0]-a[0])*r,dLo=(b[1]-a[1])*r;
  const h=Math.sin(dLa/2)**2+Math.cos(a[0]*r)*Math.cos(b[0]*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
const distTo=p=>haversine(POS||BASE,p.coords);
const fmtKm=k=>k<1?Math.round(k*1000)+' m':(k<10?k.toFixed(1):Math.round(k))+' km';
const driveMin=k=>Math.round(k<3?k*4:8+k*1.05);
let lastRenderPos=null;
function startGeo(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(p=>{
    POS=[p.coords.latitude,p.coords.longitude];
    updateMyMarker();
    if(!lastRenderPos||haversine(lastRenderPos,POS)>0.15){
      lastRenderPos=POS.slice(); refreshOpenLists(); renderMarebar();
    }
  },()=>{geoDenied=true;},{enableHighAccuracy:true,maximumAge:30000,timeout:15000});
}

function sunset(lat,lng,d=new Date()){
  const rad=Math.PI/180;
  const n=Math.ceil((d-new Date(d.getFullYear(),0,0))/864e5);
  const t=n+((18-lng/15)/24), M=(0.9856*t)-3.289;
  let L=(M+1.916*Math.sin(M*rad)+0.02*Math.sin(2*M*rad)+282.634+360)%360;
  let RA=(Math.atan(0.91764*Math.tan(L*rad))/rad+360)%360;
  RA=(RA+Math.floor(L/90)*90-Math.floor(RA/90)*90)/15;
  const sinD=0.39782*Math.sin(L*rad), cosD=Math.cos(Math.asin(sinD));
  const cosH=(Math.cos(90.833*rad)-sinD*Math.sin(lat*rad))/(cosD*Math.cos(lat*rad));
  if(cosH<-1||cosH>1) return null;
  const H=(Math.acos(cosH)/rad)/15, T=H+RA-0.06571*t-6.622;
  let UT=(T-lng/15)%24; if(UT<0)UT+=24;
  const loc=(UT+1)%24;
  return {h:Math.floor(loc),m:Math.round((loc%1)*60)};
}
function renderMarebar(){
  const now=new Date(), tk=todayKey();
  let day;
  if(tk<TRIP.start){ const d=Math.ceil((new Date(TRIP.start)-now)/864e5); day=`J−${d} avant le départ ✈️`; }
  else if(tk>TRIP.end){ day='Souvenirs d\u2019Algarve 🐚'; }
  else{ const n=Math.round((now-new Date(TRIP.start))/864e5)+1; day=`Jour ${n}/13 · ${DAYS[now.getDay()]}`; }
  $('#mb-day').innerHTML='<b>'+day+'</b>';
  const ss=sunset((POS||BASE)[0],(POS||BASE)[1]);
  if(ss){
    const pad=n=>String(n).padStart(2,'0');
    let gm=ss.m-55,gh=ss.h; if(gm<0){gm+=60;gh--;}
    $('#mb-sun').textContent=`☀️ dorée ${pad(gh)}:${pad(gm)} · coucher ${pad(ss.h)}:${pad(ss.m)}`;
  }
}

function closedToday(p){
  if(!p.horaires) return false;
  const m=p.horaires.toLowerCase().match(/ferm[ée]e?s?\s+(?:le\s+)?([a-zéè-]+)/);
  if(!m) return false;
  return m[1].startsWith(DAYS[new Date().getDay()].slice(0,5));
}
function checkInfo(id){
  const c=S.checks[id]; if(!c) return null;
  const days=Math.floor((Date.now()-new Date(c.date))/864e5);
  const ago=days<1?'aujourd\u2019hui':days===1?'hier':'il y a '+days+' j';
  return {...c,ago};
}

function rowHTML(p,showDist=true){
  const cm=CATMETA[p.cat]||CATMETA.culture;
  const d=distTo(p);
  const badges=[];
  if(S.pins.includes(p.id)) badges.push('<span class="badge pin">📌</span>');
  if(p.resa_requise) badges.push(S.resas[p.id]?'<span class="badge done">réservé ✓</span>':'<span class="badge resa">à réserver</span>');
  if(p.tag==='incontournable') badges.push('<span class="badge inc">incontournable</span>');
  const ci=checkInfo(p.id);
  if(ci&&ci.statut==='ferme') badges.push('<span class="badge ferme">signalé fermé</span>');
  else if(closedToday(p)) badges.push('<span class="badge closed">fermé aujourd\u2019hui ?</span>');
  else if(ci&&ci.statut==='ouvert') badges.push('<span class="badge ok">vérifié '+ci.ago+'</span>');
  const fav=S.favs.includes(p.id)?' ⭐':'';
  return `<button class="place-row" data-open="${p.id}">
    <span class="dot" style="background:${cm.col}"></span>
    <span class="pr-main">
      <span class="pr-name">${esc(p.nom)}${fav} ${badges.join(' ')}</span>
      <span class="pr-sub">${cm.ic} ${esc(p.sous_cat||cm.lab)}</span>
    </span>
    ${showDist?`<span class="pr-dist">${fmtKm(d)}<small>~${driveMin(d)} min 🚗</small></span>`:''}
  </button>`;
}
function renderList(items,el,empty){
  el.innerHTML=items.length?'<div class="card">'+items.map(p=>rowHTML(p)).join('')+'</div>'
    :`<div class="card"><div class="empty">${empty||'Rien par ici pour l\u2019instant.'}</div></div>`;
}

function renderQuickList(){
  const el=$('#quicklist');
  if(!activeQuick){el.innerHTML='';return;}
  const cats=QUICKMAP[activeQuick];
  let items=DB.lieux.filter(p=>cats.includes(p.cat)&&p.cat!=='base');
  items.sort((a,b)=>distTo(a)-distTo(b));
  const open=items.filter(p=>!closedToday(p)&&(checkInfo(p.id)||{}).statut!=='ferme');
  const rest=items.filter(p=>!open.includes(p));
  el.innerHTML=`<h2 class="sec">${{manger:'🍽️ Manger',boire:'🍹 Boire un verre',plage:'🏖️ Plage & balade',pdv:'👁️ Points de vue',shopping:'🛍️ Shopping',culture:'🏛️ Culture & villages'}[activeQuick]}

    <div class="card">${[...open.slice(0,12),...rest.slice(0,3)].map(p=>rowHTML(p)).join('')}</div>`;
}
let factIdx=0;
function renderFact(){
  const near=DB.facts.filter(f=>{
    if(!f.lieu) return true;
    const p=DB.lieux.find(l=>l.id===f.lieu);
    return p&&distTo(p)<25;
  });
  const pool=near.length?near:DB.facts;
  const f=pool[(new Date().getDate()+factIdx)%pool.length];
  const p=f.lieu?DB.lieux.find(l=>l.id===f.lieu):null;
  $('#factcard').innerHTML=`<span class="f-tag">Le saviez-vous ${p?'· '+esc(p.nom):''}</span>${esc(f.texte)}
    <div style="text-align:right;margin-top:6px"><button style="font-size:.72rem;text-decoration:underline;opacity:.8" id="nextfact">un autre ↻</button></div>`;
  $('#nextfact').onclick=()=>{factIdx++;renderFact();};
}

function askDay(mode){
  if(!navigator.onLine){toast('Il faut du réseau pour la suggestion du jour — le reste de l\u2019app fonctionne !');return;}
  const now=new Date();

async function verifyPlace(p){
  if(!navigator.onLine){toast('Hors ligne — vérification impossible pour le moment');return;}
  const btn=$('#a-check'); btn.innerHTML='<span class="spin dark"></span> Vérification…'; btn.disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:
`Vérifie via recherche web l'état actuel (juillet 2026) de ce lieu en Algarve, Portugal :
"${p.nom}"${p.adresse?', '+p.adresse:''} (${(DB.grappes.find(g=>g.id===p.grappe)||{}).nom||'Algarve'}).
Cherche : est-il toujours ouvert / définitivement fermé ? Jours et horaires actuels ? Que disent les avis récents (1 phrase) ?
Réponds UNIQUEMENT avec un objet JSON, sans texte autour, sans backticks :
{"statut":"ouvert"|"ferme"|"incertain","resume":"synthèse en 1-2 phrases en français","horaires":"horaires actuels ou vide"}`}]})});
    const data=await r.json();
    const txt=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m) throw new Error('réponse illisible');
    const res=JSON.parse(m[0].replace(/```json|```/g,''));
    S.checks[p.id]={date:new Date().toISOString(),statut:res.statut||'incertain',resume:res.resume||'',horaires:res.horaires||''};
    if(res.horaires) p.horaires=res.horaires;
    save(); openSheet(p.id); refreshOpenLists();
    toast(res.statut==='ouvert'?'✓ Toujours ouvert':res.statut==='ferme'?'⚠️ Signalé fermé !':'Statut incertain — prudence');
  }catch(e){ btn.disabled=false; btn.textContent='🔄 Vérifier en ligne'; toast('Vérification impossible — réessaie en 4G'); }
}

- Utilise la recherche web pour : vérifier une ouverture, trouver prix/réservation d'activités, avis récents, événements du moment. Cite tes sources brièvement.

BASE (id|nom|cat|grappe|tag|flags) :
${compactDB()}
${chatContext()}`;
function pushMsg(role,txt,label){
  S.chat.push(label?{role,content:txt,label}:{role,content:txt});
  if(S.chat.length>12) S.chat=S.chat.slice(-12);
  save();
}
function renderChat(){
  const el=$('#msgs');
  el.innerHTML=S.chat.length?S.chat.map(m=>{
    if(m.role==='user') return `<div class="msg user">${esc(m.label||m.content)}</div>`;
    return `<div class="msg bot">${fmtBot(m.content)}</div>`;
  }).join(''):`<div class="msg bot">Olá ! Dis-moi une envie, une contrainte, une heure — je pioche dans votre base de ${DB.lieux.length-1} lieux et je vérifie en ligne si besoin. 🌊</div>`;
  el.scrollTop=el.scrollHeight;
}
function fmtBot(t){
  let h=esc(t);
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  h=h.replace(/\[id:([a-z0-9-]+)\]/g,(_,id)=>{
    const p=DB.lieux.find(l=>l.id===id);
    return p?`<button class="chip-place" data-open="${id}">${esc(p.nom)} ↗</button>`:'';
  });
  return h;
}
async function sendChat(txt,label){
  txt=(txt||$('#chatin').value).trim(); if(!txt) return;
  if(!navigator.onLine){toast('Hors ligne — le chat a besoin de réseau');return;}
  $('#chatin').value=''; pushMsg('user',txt,label); renderChat();
  const el=$('#msgs');
  el.insertAdjacentHTML('beforeend','<div class="msg think" id="thinking"><span class="spin dark"></span> Maré réfléchit…</div>');
  el.scrollTop=el.scrollHeight;
  $('#chatsend').disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
        system:SYSPROMPT(),
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:S.chat.map(m=>({role:m.role,content:m.content}))})});
    const data=await r.json();
    if(data.error) throw new Error(data.error.message||'API');
    const txtOut=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    pushMsg('assistant',txtOut||'(pas de réponse — réessaie)');
  }catch(e){ pushMsg('assistant','⚠️ Je n\u2019arrive pas à répondre (réseau ou service indisponible). Réessaie dans un instant.'); }
  $('#chatsend').disabled=false; renderChat();
}

function renderCarnet(){

  $('#favcount').textContent=favs.length;
  $('#favlist').innerHTML=favs.length?favs.map(p=>rowHTML(p)).join(''):'<div class="empty">Touche ☆ sur une fiche pour garder un lieu sous la main.</div>';
  const vis=Object.entries(S.visited).map(([id,v])=>({p:DB.lieux.find(l=>l.id===id),v})).filter(x=>x.p)
    .sort((a,b)=>b.v.date.localeCompare(a.v.date));
  $('#viscount').textContent=vis.length;
  $('#vislist').innerHTML=vis.length?vis.map(({p,v})=>`
    <button class="jentry" data-open="${p.id}" style="width:100%;text-align:left">
      <span class="je-emo">${['🤍','👍','😐'][v.rating]??'✓'}</span>
      <span><span class="je-d">${v.date}</span><br><span class="je-n">${esc(p.nom)}</span>
      ${S.notes[p.id]?`<div class="je-note">« ${esc(S.notes[p.id])} »</div>`:''}</span>
    </button>`).join(''):'<div class="empty">Le journal se remplira tout seul — marque les lieux « visités » au fil des jours.</div>';
  const resas=DB.lieux.filter(p=>p.resa_requise).sort((a,b)=>(S.resas[a.id]?1:0)-(S.resas[b.id]?1:0));
  $('#resalist').innerHTML=resas.map(p=>rowHTML(p)).join('');
  $('#infos').innerHTML=`
    ${acc('⛽ Essence & péages',esc(DB.pratique.essence.note)+'<br><br>'+esc(DB.facts.find(f=>f.texte.includes('Péages')).texte))}
    ${acc('🅿️ Parkings',esc(DB.pratique.parkings.note))}
    ${acc('🌊 Marées & îles','L\u2019accès aux bancs de sable (Fuseta, Cacela) et le charme des îles dépendent de la marée. <a target="_blank" rel="noopener" href="https://tabuademares.com/pt/faro/olhao">Table des marées Olhão ↗</a> — à consulter la veille pour viser la marée basse.')}
    ${acc('🗣️ Petites phrases',DB.pratique.langues_cles.map(esc).join('<br>'))}
    ${acc('🚨 Urgences & sécurité',esc(DB.pratique.urgences))}
    ${acc('📅 Le piège du dimanche',esc(DB.facts.find(f=>f.texte.includes('dimanche')).texte))}
    ${acc('🚩 Drapeaux de plage',esc(DB.facts.find(f=>f.texte.includes('Drapeaux')).texte))}
    ${memOnly?acc('⚠️ Mode aperçu','Stockage indisponible ici : favoris et notes ne survivront pas à la fermeture. Une fois l\u2019app publiée et ouverte via son lien, tout est sauvegardé automatiquement.'):''}
  `;
}
const acc=(t,b)=>`<details class="acc"><summary>${t}</summary><div class="acc-b">${b}</div></details>`;

function refreshOpenLists(){
  renderIci();
  if($('#v-explorer').classList.contains('active')) renderExplorer();
  if($('#v-carnet').classList.contains('active')) renderCarnet();
}
function switchView(v){
  $$('.view').forEach(x=>x.classList.remove('active'));
  $('#v-'+v).classList.add('active');
  $$('nav.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  if(v==='carte'){initMap();setTimeout(()=>MAP.invalidateSize(),80);}
  if(v==='explorer') renderExplorer();
  if(v==='carnet') renderCarnet();
  if(v==='chat'){renderChat();}
  window.scrollTo({top:0});
}
document.addEventListener('click',e=>{
  const o=e.target.closest('[data-open]');
  if(o){openSheet(o.dataset.open);return;}
});
function bindUI(){
  $$('nav.tabs button').forEach(b=>b.onclick=()=>switchView(b.dataset.v));
  $('#veil').onclick=closeSheet;
  $$('.quick [data-q]').forEach(b=>b.onclick=()=>{activeQuick=b.dataset.q;renderQuickList();
    setTimeout(()=>$('#quicklist').scrollIntoView({behavior:'smooth',block:'start'}),60);});
  $$('.quick [data-u]').forEach(b=>b.onclick=()=>{
    if(b.dataset.u==='chat') switchView('chat'); else openUtil(b.dataset.u);
  });
  $('#chatsend').onclick=()=>sendChat();
  $('#chatin').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
  $('#sugg').onclick=e=>{const b=e.target.closest('button'); if(b) sendChat(b.textContent);};
  window.addEventListener('online',()=>$('#offdot').classList.remove('show'));
  window.addEventListener('offline',()=>$('#offdot').classList.add('show'));
  if(!navigator.onLine)$('#offdot').classList.add('show');
}
let toastT=null;
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

(async function init(){
  await loadState();
  bindUI(); bindSearch();
  renderMarebar(); renderIci(); renderMapChips();
  startGeo();
  setInterval(renderMarebar,60000);
})();

</script>
